<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athletic Helper</title>
  <!-- import bulma -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link href="./style.css" rel="stylesheet" />
  <link href="../../common/team-selector.css" rel="stylesheet" />
  <link href="../../common/accordion.css" rel="stylesheet" />
  <link href="../../navbar.css" rel="stylesheet" />
  <script src="../../../public/jquery-3.7.1.min.js"></script>
  <script src="../../navbar.js"></script>
  <script src="../../common/accordion.js"></script>
</head>

<body class="page-xc-team">
  <main class="app-shell">
    <section class="page-hero">
      <p class="page-kicker">Cross Country</p>
      <h1 class="page-title">Meet Simulator</h1>
      <p class="page-subtitle">
        Compare teams, test filters, and print a dual-meet result summary.
      </p>
    </section>

    <section class="panel-card">
      <form id="teamsInput">
        <div id="teamSelectorContainer" class="field">
          <label class="label">Teams</label>
          <div class="team-tag-container"></div>
          <div class="control">
            <input type="text" class="input team-search" placeholder="Search for a team" autocomplete="off" />
            <div class="suggestions-box"></div>
          </div>
        </div>

        <button type="button" class="accordion subtitle is-5">Saved Team Lists</button>
        <div class="panel">
          <div class="field">
            <label class="label">Saved Lists</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="teamListSelectCrossCountry">
                  <option value="">Select saved list...</option>
                </select>
              </div>
            </div>
          </div>
          <div class="field">
            <label class="label">List Name</label>
            <div class="control">
              <input type="text" id="teamListNameCrossCountry" class="input" placeholder="Enter list name" />
            </div>
          </div>
          <div class="buttons">
            <button type="button" id="loadTeamListCrossCountry" class="button is-link is-light">Load</button>
            <button type="button" id="saveTeamListCrossCountry" class="button is-success is-light">Save as New</button>
            <button type="button" id="updateTeamListCrossCountry" class="button is-primary is-light">Update</button>
            <button type="button" id="deleteTeamListCrossCountry" class="button is-danger is-light">Delete</button>
          </div>
        </div>

        <div class="toolbar">
          <button type="submit" id="simulateButton" class="button is-link">Simulate</button>
          <button type="button" id="printResults" class="button is-info is-light">Print Results</button>
          <div class="select">
            <select id="distance"></select>
          </div>
        </div>

        <div class="toggle-list" style="margin-top: 0.65rem;">
          <label class="checkbox">
            <input type="checkbox" id="showTop7Only" />
            Show only top 7 per team
          </label>
          <label class="checkbox">
            <input type="checkbox" id="enableTop7Scoring" checked />
            Enable top-7 varsity scoring
          </label>
        </div>
      </form>
    </section>

    <section id="resultsDiv" class="results-stack">
      <div id="boys" class="results-card">
        <h2 class="subtitle">Boys</h2>
        <div class="results-filter-bar">
          <div class="buttons has-addons is-small result-filter-buttons" data-gender="boys">
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="overall">Overall</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="froshSoph">Frosh/Soph</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="jv">JV</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="reserve">Reserve</button>
          </div>
          <p class="is-size-6 has-text-weight-semibold current-filter-label" data-gender="boys">Showing: Overall</p>
        </div>
        <h3 class="subtitle is-5">Placements</h3>
        <div class="table-shell">
          <table class="placementTable table is-striped is-fullwidth">
            <thead>
              <tr>
                <th>Place</th>
                <th>Grade</th>
                <th>Name</th>
                <th>Time</th>
                <th>Team</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <h3 class="subtitle is-5">Team Scores</h3>
        <div class="table-shell">
          <table class="scoreTable table is-striped is-fullwidth">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div id="girls" class="results-card">
        <h2 class="subtitle">Girls</h2>
        <div class="results-filter-bar">
          <div class="buttons has-addons is-small result-filter-buttons" data-gender="girls">
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="overall">Overall</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="froshSoph">Frosh/Soph</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="jv">JV</button>
            <button type="button" class="button is-small is-link is-light result-filter-button" data-filter="reserve">Reserve</button>
          </div>
          <p class="is-size-6 has-text-weight-semibold current-filter-label" data-gender="girls">Showing: Overall</p>
        </div>
        <h3 class="subtitle is-5">Placements</h3>
        <div class="table-shell">
          <table class="placementTable table is-striped is-fullwidth">
            <thead>
              <tr>
                <th>Place</th>
                <th>Grade</th>
                <th>Name</th>
                <th>Time</th>
                <th>Team</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <h3 class="subtitle is-5">Team Scores</h3>
        <div class="table-shell">
          <table class="scoreTable table is-striped is-fullwidth">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <script src="../../common/teamSelector.js"></script>
    <script src="script.js"></script>
    <script src="../../../build/bundle.js"></script>
  </main>
</body>

</html>
