<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athletic Helper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="navbar.css" />
  <script src="navbar.js"></script>
  <script src="script.js"></script>
</head>

<body class="page-home">
  <main class="app-shell">
    <section class="page-hero">
      <p class="page-kicker">Athletic Helper</p>
      <!-- <h1 class="page-title">The side panel adapts to Athletic.net pages</h1> -->
      <p class="page-subtitle">
        Open a team, athlete, meet, or division page and the panel switches to the matching tool.
        If the panel does not refresh, use the button below.
      </p>
      <div class="actions-row" style="margin-top: 0.8rem;">
        <button class="button is-link is-light" id="sendMessageButton" type="button">Refresh Side Panel</button>
      </div>
    </section>

    <section class="panel-card">
      <h2 class="section-heading">Jump Right In</h2>
      <div class="quick-link-grid">
        <a class="quick-link-card" href="https://www.athletic.net/team/1067/track-and-field-outdoor/2025">
          <strong>Team Example</strong>
          <span>Track and field team page</span>
        </a>
        <a class="quick-link-card" href="https://www.athletic.net/athlete/14259158/track-and-field/high-school">
          <strong>Athlete Example</strong>
          <span>Athlete progression chart page</span>
        </a>
        <a class="quick-link-card" href="https://www.athletic.net/TrackAndField/meet/599825/results">
          <strong>Meet Example</strong>
          <span>Track meet scoring page</span>
        </a>
      </div>
    </section>
  </main>
</body>

</html>
