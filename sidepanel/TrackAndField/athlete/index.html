<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athletic Helper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../../navbar.css" />
  <script src="../../navbar.js"></script>
</head>

<body class="page-tf-athlete">
  <main class="app-shell">
    <section class="page-hero">
      <p class="page-kicker">Track And Field</p>
      <h1 class="page-title">Event Progression</h1>
      <p class="page-subtitle">
        Visualize performance trends for each event and event variation.
      </p>
    </section>

    <section class="panel-card">
      <div class="toolbar">
        <label class="label" for="eventDropDown" style="margin: 0;">Event</label>
        <div class="select">
          <select name="event" id="eventDropDown" disabled>
          </select>
        </div>
      </div>
      <div class="box chart-container" style="margin-top: 0.85rem;">
        <canvas id="myChart"></canvas>
      </div>
    </section>
  </main>

  <script src="../../../build/bundle.js"></script>
  <script src="../../../public/luxon.min.js"></script>
  <script src="../../../public/chart.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
