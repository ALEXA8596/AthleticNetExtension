<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athletic Helper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../../navbar.css" />
  <script src="../../navbar.js"></script>
</head>

<body class="page-xc-athlete">
  <main class="app-shell">
    <section class="page-hero">
      <p class="page-kicker">Cross Country</p>
      <h1 class="page-title">Athlete Progression</h1>
      <p class="page-subtitle">
        Load an athlete page to graph performance progression over time for each distance.
      </p>
    </section>

    <section class="panel-card">
      <div class="toolbar">
        <button id="getUrlButton" class="button is-link" type="button">Reload Athlete Data</button>
        <div class="select">
          <select name="distance" id="distanceDropDown" disabled>
          </select>
        </div>
      </div>
      <div class="box chart-container" style="margin-top: 0.85rem;">
        <canvas id="myChart"></canvas>
      </div>
    </section>
  </main>

  <script src="../../../build/bundle.js"></script>
  <script src="script.js"></script>
  <script src="../../../public/luxon.min.js"></script>
  <script src="../../../public/chart.min.js"></script>
  <script src="../../../public/chartjs-adapter-luxon.js"> </script>
</body>

</html>
